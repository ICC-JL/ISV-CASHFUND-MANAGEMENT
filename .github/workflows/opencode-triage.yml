Review this issue for the ATPTEFM CashFundManagement Acumatica ISV solution.
            If the issue describes a clear, actionable bug or feature request that can be safely implemented:
            - Create a new branch
            - Implement the fix or feature
            - Open a pull request that references this issue
            - Include a concise description of the changes and any testing notes
            If the issue is unclear, requires more information, or is not safe to automate, do not comment or create a PR.

name: Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - uses: actions/checkout@v6
        if: steps.check.outputs.result == 'true'

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.result == 'true'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: kimi-for-coding/k2p6
          use_github_token: true
          prompt: |
            Review this issue for the ATPTEFM CashFundManagement Acumatica ISV solution.
            If the issue describes a clear, actionable bug or feature request that can be safely implemented:
            - Create a new branch
            - Implement the fix or feature
            - Open a pull request that references this issue
            - Include a concise description of the changes and any testing notes
            If the issue is unclear, requires more information, or is not safe to automate, do not comment or create a PR.
