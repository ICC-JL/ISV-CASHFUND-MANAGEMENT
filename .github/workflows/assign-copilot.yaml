name: Assign New Issues to GitHub Copilot

on:
  issues:
    types: [opened, reopened]

jobs:
  assign-to-copilot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: write
      pull-requests: write

    steps:
      - name: Check Auto-assign field
        id: check-auto-assign
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if echo "$ISSUE_BODY" | grep -qiP 'Auto-assign(\s+AI)?\s*\|\s*False'; then
            echo "auto_assign=false" >> "$GITHUB_OUTPUT"
          else
            echo "auto_assign=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assign issue to Copilot coding agent
        if: steps.check-auto-assign.outputs.auto_assign == 'true'
        env:
          # Create a fine-grained PAT at https://github.com/settings/tokens?type=beta with these permissions:
          # Read access to metadata
          # Read and write access to actions, contents, issues, and pull requests
          # Scope it to the ICC-Dev-Team/ISV-CASHFUND-MANAGEMENT repo
          # Add it as a repository secret named COPILOT_PAT:
          # Go to your repo Settings > Secrets and variables > Actions
          # Click New repository secret
          # Name: COPILOT_PAT
          # Value: paste the PAT
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/$OWNER/$REPO/issues/$ISSUE_NUMBER/assignees \
            --input - <<< '{
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "'"$OWNER/$REPO"'",
              "base_branch": "main",
              "custom_instructions": "",
              "custom_agent": "",
              "model": "claude-sonnet-4.6"
            }
          }'
